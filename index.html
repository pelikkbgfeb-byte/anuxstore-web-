<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANUXSTORE | CEO EDITION</title>
    <style>
        :root { --p: #8a00ff; --s: #00f2ff; --bg: #0b0e14; --c: #161b22; --t: #fff; }
        body { background: var(--bg); color: var(--t); font-family: sans-serif; margin: 0; padding: 0; }
        nav { background: rgba(22,27,34,0.9); padding: 15px; text-align: center; border-bottom: 2px solid var(--p); position: sticky; top: 0; z-index: 99; }
        .logo-ax { font-size: 1.5rem; font-weight: 900; color: var(--s); text-shadow: 0 0 10px var(--s); cursor: pointer; user-select: none; }
        .ticker { background: var(--p); color: #fff; padding: 5px; font-size: 12px; overflow: hidden; white-space: nowrap; }
        .t-in { display: inline-block; animation: m 15s linear infinite; }
        @keyframes m { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: var(--c); border-radius: 12px; aspect-ratio: 1/1; position: relative; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .card:active { transform: scale(0.95); border-color: var(--s); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-t { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.8); text-align: center; padding: 5px 0; font-size: 12px; font-weight: bold; }
        .badge { position: absolute; top: 10px; right: -25px; width: 100px; background: red; font-size: 10px; font-weight: bold; transform: rotate(45deg); text-align: center; }
        #form { display: none; background: #1c2128; padding: 20px; border-radius: 15px; border: 1px solid var(--p); margin-top: 20px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #0d1117; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--p); color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px var(--p); }
        .inactive { filter: grayscale(1); opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <nav><div class="logo-ax" id="logoAX">ANUXSTORE</div></nav>
    <div class="ticker"><div class="t-in">🔥 ANUXSTORE Gacor Parah! | ✅ Transaksi Aman Terpercaya | ⚡ Proses Kilat 24 Jam</div></div>
    <div class="container">
        <div class="grid" id="g"></div>
        <div id="form">
            <h3 id="gt" style="color:var(--s); text-align: center;">ORDER</h3>
            <input type="number" id="uid" placeholder="User ID">
            <input type="number" id="zid" placeholder="Zone ID (Hanya ML)" style="display:none">
            <select id="nom">
                <option>5 Diamond - Rp 1.500</option>
                <option>50 Diamond - Rp 12.000</option>
                <option>100 Diamond - Rp 23.000</option>
            </select>
            <button class="btn" id="bb" onclick="pay()">BAYAR SEKARANG</button>
            <button onclick="location.reload()" style="background:none; border:none; color:gray; width:100%; margin-top:15px; cursor:pointer">Kembali ke Menu</button>
        </div>
    </div>

    <script>
        const pw = "CEO ANUX";
        const gs = [
            {id:'ML', n:'Mobile Legends', img:'https://i.ibb.co/S7mS8Y1/mlbb-logo.png', s:true},
            {id:'FF', n:'Free Fire', img:'https://i.ibb.co/vX8X6Y5/ff-logo.png', s:true},
            {id:'PUBG', n:'PUBGM', img:'https://i.ibb.co/9V9V6Y5/pubg-logo.png', s:false}
        ];

        function render() {
            const dr = document.getElementById('g');
            dr.innerHTML = '';
            gs.forEach(x => {
                let b = x.s ? '' : '<div class="badge">OFF</div>';
                let c = x.s ? '' : 'inactive';
                dr.innerHTML += `
                    <div class="card ${c}" onclick="openO('${x.id}','${x.n}')">
                        ${b}
                        <img src="${x.img}">
                        <div class="card-t">${x.n}</div>
                    </div>`;
            });
        }

        function openO(id, n) {
            document.getElementById('g').style.display = 'none';
            document.getElementById('form').style.display = 'block';
            document.getElementById('gt').innerText = 'TOP UP ' + n;
            document.getElementById('zid').style.display = (id === 'ML') ? 'block' : 'none';
        }

        function pay() {
            const u = document.getElementById('uid').value;
            if(!u) return alert("Isi ID Dulu Bos!");
            document.getElementById('bb').innerText = "MENUNGGU KONFIRMASI...";
            setTimeout(() => { 
                alert("Pesanan " + u + " Berhasil Diterima!\nAdmin akan segera memproses."); 
                location.reload(); 
            }, 1500);
        }

        // Fitur Rahasia CEO
        let t; const l = document.getElementById('logoAX');
        l.onmousedown = l.ontouchstart = () => t = setTimeout(() => { 
            if(prompt("PASS CEO:") === pw) alert("Selamat Datang Boss Anugerah!\nSaldo Admin: Rp 5.000.000"); 
        }, 5000);
        l.onmouseup = l.ontouchend = () => clearTimeout(t);

        render();
    </script>
</body>
</html>
